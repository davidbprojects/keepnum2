  # ═══════════════════════════════════════════════════════════════════════════
  # Webhook routes (no Cognito authorizer — WAF-allowlisted)
  # ═══════════════════════════════════════════════════════════════════════════
  /webhooks/telnyx/call:
    post:
      tags: [Webhooks]
      summary: Telnyx call webhook
      description: >
        Receives Telnyx call control webhooks (call.initiated, call.answered, etc.).
        This endpoint is unauthenticated — protected by WAF IP allowlisting for
        Telnyx source IPs. The handler processes the full call routing decision tree:
        block list check, spam filter, per-caller rules, call screening, and forwarding.
      operationId: telnyxCallWebhook
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelnyxCallWebhookPayload'
      responses:
        '200':
          description: Webhook processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookAck'
              example:
                message: Event acknowledged
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /webhooks/telnyx/sms:
    post:
      tags: [Webhooks]
      summary: Telnyx SMS webhook
      description: >
        Receives Telnyx messaging webhooks (message.received, etc.).
        This endpoint is unauthenticated — protected by WAF IP allowlisting for
        Telnyx source IPs. The handler processes spam filtering, SMS/email forwarding,
        and MMS media storage.
      operationId: telnyxSmsWebhook
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelnyxSmsWebhookPayload'
      responses:
        '200':
          description: Webhook processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookAck'
              example:
                message: Event acknowledged
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /webhooks/telnyx/voicemail:
    post:
      tags: [Webhooks]
      summary: Telnyx voicemail webhook
      description: >
        Receives Telnyx recording webhooks (recording.completed,
        recording.transcription.completed). This endpoint is unauthenticated —
        protected by WAF IP allowlisting for Telnyx source IPs. The handler stores
        audio, creates voicemail records, and processes transcription results.
      operationId: telnyxVoicemailWebhook
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelnyxVoicemailWebhookPayload'
      responses:
        '200':
          description: Webhook processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookAck'
              example:
                message: Event acknowledged
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /webhooks/adyen:
    post:
      tags: [Webhooks]
      summary: Adyen payment webhook
      description: >
        Receives Adyen payment notification webhooks (AUTHORISATION, CANCELLATION,
        REFUND, CHARGEBACK). This endpoint is unauthenticated — protected by WAF IP
        allowlisting for Adyen source IPs and HMAC signature validation. The handler
        verifies the HMAC signature before processing any event.
      operationId: adyenWebhook
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdyenWebhookPayload'
      responses:
        '200':
          description: Webhook processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookAck'
              example:
                message: '[accepted]'
        '401':
          description: Invalid HMAC signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Invalid HMAC signature
        '500':
          $ref: '#/components/responses/InternalError'

