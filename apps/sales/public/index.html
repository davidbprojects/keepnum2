<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="KeepNum — Park your phone numbers. Forward calls, receive voicemail transcriptions, and more." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>KeepNum — Park Your Phone Numbers</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; scroll-behavior: smooth; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #111827;
        line-height: 1.6;
      }
      a { color: #2563eb; text-decoration: none; }
      a:hover { text-decoration: underline; }
      ::selection { background: #dbeafe; color: #1e40af; }
      button:hover:not(:disabled) { filter: brightness(1.05); }
      button:active:not(:disabled) { transform: translateY(1px); }
    </style>
  </head>

    <div id="root"></div>
